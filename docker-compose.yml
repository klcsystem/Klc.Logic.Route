services:
  postgres:
    image: postgres:16-alpine
    container_name: logicroute-postgres
    ports: ["1642:5432"]
    environment:
      POSTGRES_DB: logicroute
      POSTGRES_USER: logicroute
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logicroute123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logicroute -d logicroute"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: logicroute-redis
    ports: ["1643:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: logicroute-rabbitmq
    ports:
      - "1644:5672"
      - "1645:15672"
    environment:
      RABBITMQ_DEFAULT_USER: logicroute
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-logicroute2026}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./src
      dockerfile: Klc.LogicRoute.Api/Dockerfile
    container_name: logicroute-api
    ports: ["1641:8080"]
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=logicroute;Username=logicroute;Password=${POSTGRES_PASSWORD:-logicroute123}
      - ConnectionStrings__Redis=redis:6379
      - ASPNETCORE_ENVIRONMENT=Development
      - Cors__Origins__0=http://localhost:1640
      - Jwt__Secret=${JWT_SECRET:-LogicRoute-Super-Secret-Key-2026-Must-Be-At-Least-32-Characters!}
      - Jwt__Issuer=LogicRoute
      - Jwt__Audience=LogicRoute
      - Jwt__ExpirationMinutes=60
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=logicroute
      - RabbitMQ__Password=${RABBITMQ_PASSWORD:-logicroute2026}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: logicroute-web
    ports: ["1640:80"]
    depends_on:
      - api

volumes:
  postgres-data:
